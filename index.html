<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星尘 · 极致银河与灵兽 | 行书文字</title>
  <style>
    :root {
      --bg: #000312;
      --panel-bg: rgba(8, 6, 22, 0.82);
      --text: #e0daf5;
      --accent: #f5b042;
      --btn-bg: rgba(20, 16, 42, 0.7);
      --btn-hover: rgba(36, 28, 64, 0.88);
      --btn-active: rgba(88, 50, 155, 0.82);
      --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      overflow: hidden;
      font-family: var(--font);
      height: 100vh;
      width: 100vw;
      user-select: none;
      cursor: grab;
    }
    body:active {
      cursor: grabbing;
    }
    body.dragging {
      cursor: grabbing;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: auto;
    }

    /* 提示覆盖层 */
    #hint-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 120;
      text-align: center;
      pointer-events: none;
      transition: opacity 1s;
      opacity: 1;
    }
    #hint-overlay.fading {
      opacity: 0;
      transition: opacity 1.5s;
    }
    .hint-ring {
      width: 54px;
      height: 54px;
      border: 2px solid rgba(190, 180, 240, 0.45);
      border-radius: 50%;
      margin: 0 auto 16px;
      position: relative;
      animation: pulse 2.5s infinite;
    }
    .hint-ring::after {
      content: '';
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 13px;
      background: rgba(225, 215, 255, 0.85);
      border-radius: 4px;
      animation: dot 2.5s infinite;
    }
    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
    }
    @keyframes dot {
      0%,
      100% {
        top: 7px;
        opacity: 0.6;
      }
      50% {
        top: 30px;
        opacity: 1;
      }
    }
    .hint-text {
      color: rgba(215, 208, 240, 0.82);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-shadow: 0 0 28px rgba(145, 125, 220, 0.55);
    }

    /* 进度指示器 */
    #progress-indicator {
      position: fixed;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      pointer-events: auto;
    }
    #progress-bar-track {
      width: 10px;
      height: 155px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.5);
    }
    #progress-bar-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #f5b042, #f07b4e, #c886f0, #6d8cf8);
      border-radius: 2px;
      transition: height 0.22s;
      box-shadow: 0 0 16px rgba(175, 130, 225, 0.65);
    }
    .progress-label {
      color: rgba(200, 188, 230, 0.5);
      font-size: 9px;
      letter-spacing: 0.07em;
      writing-mode: vertical-rl;
    }
    
  #morph-slider {
  position: absolute;
  top: 0;
  left: 0;
  width: 10px;              /* 与进度条宽度保持一致 */
  height: 155px;            /* 与进度条高度保持一致 */
  -webkit-appearance: none;
  background: transparent;
  cursor: pointer;
  z-index: 10;
  writing-mode: vertical-lr; /* 让滑块从垂直方向拖动（从上到下） */
  direction: rtl;            /* 反转滑动方向，使向上=数值增大 */
}
#morph-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  background: rgba(255,255,255,0.95);
  border-radius: 50%;
  box-shadow: 0 0 14px var(--accent);
  margin-top: -10px;        /* 让拇指垂直居中 */
  margin-left: -5px;        /* 让拇指水平居中（滑块宽度10px，拇指20px，偏移一半） */
}

    /* 底部面板 */
    #panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 130;
      background: var(--panel-bg);
      backdrop-filter: blur(26px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 9px 0 14px;
      transition: transform 0.42s;
      box-shadow: 0 -10px 38px rgba(0, 0, 0, 0.55);
    }
    #panel.collapsed {
      transform: translateY(calc(100% - 36px));
    }
    #panel-toggle {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 22px;
      background: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: none;
      border-radius: 13px 13px 0 0;
      cursor: pointer;
      z-index: 131;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(26px);
    }
    #panel-toggle span {
      display: block;
      width: 17px;
      height: 2px;
      background: rgba(200, 190, 230, 0.7);
      border-radius: 1px;
      transition: transform 0.35s;
    }
    #panel.collapsed #panel-toggle span {
      transform: rotate(180deg);
    }
    #panel-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      padding: 0 14px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .shape-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .shape-btn:hover {
      background: var(--btn-hover);
      border-color: rgba(255, 255, 255, 0.4);
      color: #fff;
      box-shadow: 0 0 26px rgba(115, 85, 195, 0.45);
      transform: translateY(-3px);
    }
    .shape-btn.active {
      background: var(--btn-active);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 30px rgba(220, 150, 50, 0.55);
      font-weight: 600;
    }
    .custom-btn {
      background: rgba(30, 20, 55, 0.75);
      border-color: rgba(180, 150, 220, 0.3);
    }

    /* 文字输入覆盖层 */
    #text-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #text-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .text-card {
      background: rgba(18, 14, 36, 0.88);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 32px 36px 28px;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    }
    #custom-text {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(10, 8, 28, 0.8);
      color: #e8e4ff;
      font-size: 18px;
      text-align: center;
      outline: none;
      font-family: "STXingkai", "KaiTi", "楷体", cursive;
      resize: vertical;
      min-height: 80px;
      margin: 18px 0;
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.4);
    }
    .input-btn {
      padding: 10px 26px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(30, 22, 55, 0.75);
      color: #d8d4f0;
      cursor: pointer;
      margin: 0 6px;
      transition: all 0.25s;
    }
    .input-btn.primary {
      background: rgba(110, 65, 180, 0.75);
      border-color: var(--accent);
    }
    .input-btn:hover {
      background: rgba(60, 40, 100, 0.8);
      color: #fff;
    }

    /* 响应式调整 */
    @media (max-width: 768px) {
      .shape-btn {
        padding: 5px 10px;
        font-size: 10px;
        border-radius: 16px;
      }
      #panel-inner {
        gap: 4px;
        padding: 0 6px;
      }
      .hint-ring {
        width: 40px;
        height: 40px;
      }
      .hint-text {
        font-size: 11px;
      }
      #progress-indicator {
        right: 6px;
      }
      #progress-bar-track {
        height: 110px;
        width: 10px;
      }
      .text-card {
        padding: 20px;
      }
      #custom-text {
        font-size: 16px;
      }
            #morph-slider {
  width: 10px;
  height: 110px;
}
#morph-slider::-webkit-slider-thumb {
  width: 28px;
  height: 28px;
  margin-top: -14px;
  margin-left: -9px;
}
    }
    @media (max-width: 480px) {
      .shape-btn {
        padding: 4px 7px;
        font-size: 9px;
        border-radius: 13px;
      }
      #panel-inner {
        gap: 3px;
        padding: 0 3px;
      }
    }
  </style>

  <script type="module">

    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    // ==================== 粒子配置 ====================
    const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent) || window.innerWidth < 768;
    const MAIN = isMobile ? 35000 : 100000;   // 主粒子
    const MID  = isMobile ? 12000  : 35000;   // 中层粒子

    // ==================== 场景初始化 ====================
    const scene = new THREE.Scene();

    scene.fog = new THREE.FogExp2('#000312', 0.000004);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.4, 70);
    camera.position.set(0, 2.8, 12.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // 后期特效：Bloom辉光
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.2, 0.7, 0.06);
    composer.addPass(bloom);

    // ==================== 纹理生成 ====================
    function makeTex(s, color1, color2) {
      const c = document.createElement('canvas');
      c.width = s;
      c.height = s;
      const ctx = c.getContext('2d'),
        h = s / 2;
      const g = ctx.createRadialGradient(h, h, 0, h, h, h);
      g.addColorStop(0, color1);
      g.addColorStop(0.03, color1);
      g.addColorStop(0.12, color2);
      g.addColorStop(0.5, 'rgba(60,30,120,0.02)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, s, s);
      return new THREE.CanvasTexture(c);
    }
    const texMain = makeTex(128, 'rgba(255,255,255,0.7)', 'rgba(255,180,100,0.5)');
    const texMid  = makeTex(64,  'rgba(255,255,250,1)', 'rgba(180,140,220,0.5)');

    // ==================== 银河分布 ====================
    function galaxyPositions(count, radius) {
      const pos = new Float32Array(count * 3);
      const arms = 5,
        twist = 2.95;
      for (let i = 0; i < count; i++) {
        let r, angle, y;
        if (i < count * 0.3) {
          // 核球
          r = Math.pow(Math.random(), 2) * radius * 0.18;
          angle = Math.random() * Math.PI * 2;
          y = (Math.random() - 0.5) * r * 1.5;
        } else if (i < count * 0.7) {
          // 主旋臂
          const arm = i % arms;
          const base = (arm / arms) * Math.PI * 2;
          const t = Math.pow(Math.random(), 0.55);
          r = t * radius * 0.9 + radius * 0.04;
          angle = base + Math.log(r + 0.6) * twist + (Math.random() - 0.5) * 0.4;
          y = (Math.random() - 0.5) * 0.15 * r * (1 - t * 0.6);
          if (Math.random() < 0.15) { i--;
            continue; }
        } else if (i < count * 0.9) {
          // 旋臂桥接
          const arm = i % arms;
          const base = (arm / arms) * Math.PI * 2 + 0.3;
          r = radius * 0.4 + Math.random() * radius * 0.65;
          angle = base + Math.log(r + 0.6) * twist * 1.1 + (Math.random() - 0.5) * 0.8;
          y = (Math.random() - 0.5) * r * 0.4;
        } else {
          // 弥散晕
          r = radius * 0.3 + Math.random() * radius * 0.9;
          angle = Math.random() * Math.PI * 2;
          y = (Math.random() - 0.5) * r * 0.7;
        }
        pos[i * 3] = Math.cos(angle) * r;
        pos[i * 3 + 2] = Math.sin(angle) * r;
        pos[i * 3 + 1] = y;
      }
      return pos;
    }

    // ==================== SVG 形状采样 ====================
   const svgPaths = {

1: 'M50,5 L60,30 L90,30 L65,48 L75,85 L50,65 L25,85 L35,48 L10,30 L40,30 Z M50,20 L55,35 L70,35 L58,45 L63,60 L50,50 L37,60 L42,45 L30,35 L45,35 Z',

2: 'M10,55 C10,30 35,10 60,20 C75,25 85,35 90,30 C95,45 85,65 70,70 C60,75 65,90 50,95 C35,90 25,80 20,70 C15,65 12,60 10,55 Z M55,35 C65,30 75,35 70,45 C65,50 55,48 55,35 Z',

5: 'M20,50 C20,25 75,25 80,50 C85,75 50,90 25,70 C10,60 10,40 20,50 Z M25,50 L10,40 L10,60 Z',

// 🦋 蝴蝶（更展开）
8: 'M30,40 C15,15 45,5 50,35 C55,5 85,15 70,40 C85,65 55,75 50,55 C45,75 15,65 30,40 Z',

13: 'M35,45 C35,25 60,25 60,45 C60,70 45,75 45,75 C45,75 35,65 35,45 Z M40,35 L50,40 L40,45 Z M50,40 L60,35 L60,45 Z',

// 🐑 羊（柔和）

};

// 新增：自适应采样函数。根据曲线弯曲程度智能分配采样点
function adaptiveSamplePath(pathStr, pointCount, scale) {
    const div = document.createElement('div');
    div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="${pathStr}" fill="white"/></svg>`;
    document.body.appendChild(div);
    const loader = new SVGLoader();
    const data = loader.parse(div.querySelector('svg').outerHTML);
    document.body.removeChild(div);

    const allPoints = [];
    data.paths.forEach(path => {
        const shapes = path.toShapes(false);
        shapes.forEach(shape => {
            const curves = shape.curves;
            curves.forEach(curve => {
                // 自适应分段：长度越长，分段越多
                const segments = Math.max(10, Math.floor(curve.getLength() * 2.5));
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const pt = curve.getPoint(t);
                    allPoints.push(new THREE.Vector3(
                        (pt.x - 50) * scale / 50,
                        -(pt.y - 50) * scale / 50,
                        (Math.random() - 0.5) * 0.15 * scale
                    ));
                }
            });
        });
    });

    const positions = new Float32Array(pointCount * 3);
    for (let i = 0; i < pointCount; i++) {
        const p = allPoints[i % allPoints.length];
        positions[i * 3] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;
    }
    return positions;
}

// 新增：增强采样函数。同时采样轮廓和内部，生成“粒子云”效果
function sampleEnhancedSVG(pathStr, outlineRatio, count, scale) {
    // 1. 先获得轮廓点 (使用更精细的自适应采样)
    const div = document.createElement('div');
    div.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="${pathStr}" fill="white"/></svg>`;
    document.body.appendChild(div);
    const loader = new SVGLoader();
    const data = loader.parse(div.querySelector('svg').outerHTML);
    document.body.removeChild(div);

    const outlinePoints = [];
    data.paths.forEach(path => {
        const shapes = path.toShapes(false);
        shapes.forEach(shape => {
            const curves = shape.curves;
            curves.forEach(curve => {
                const segments = Math.max(15, Math.floor(curve.getLength() * 5.5));
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const pt = curve.getPoint(t);
                    outlinePoints.push(new THREE.Vector2(pt.x, pt.y));
                }
            });
        });
    });

    // 2. 生成内部填充点 (使用更高效的命中测试)
    const outlineCount = Math.floor(count * (outlineRatio || 0.65));
    const innerCount = count - outlineCount;
    const positions = new Float32Array(count * 3);
    
    // 填充轮廓点
    for (let i = 0; i < outlineCount; i++) {
        const p = outlinePoints[i % outlinePoints.length];
        positions[i * 3] = (p.x - 50) * scale / 50;
        positions[i * 3 + 1] = -(p.y - 50) * scale / 50;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 0.15 * scale;
    }

    // 填充内部点 (通过包围盒和Canvas命中测试)
    if (innerCount > 0) {
        const canvas = document.createElement('canvas');
        canvas.width = 100; canvas.height = 100;
        const ctx = canvas.getContext('2d');
        const path2D = new Path2D(pathStr);
        
        for (let i = 0; i < innerCount; i++) {
            let x, y, attempts = 0;
            do {
                x = 10 + Math.random() * 80; // 在可能的包围盒内随机
                y = 10 + Math.random() * 80;
                attempts++;
            } while (!ctx.isPointInPath(path2D, x, y) && attempts < 100);
            
            const idx = outlineCount + i;
            positions[idx * 3] = (x - 50) * scale / 50;
            positions[idx * 3 + 1] = -(y - 50) * scale / 50;
            positions[idx * 3 + 2] = (Math.random() - 0.5) * 0.25 * scale;
        }
    }

    return positions;
}

    function sampleSVGPath(pathStr, count, scale) {
      const div = document.createElement('div');
      div.innerHTML =
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="${pathStr}" fill="white"/></svg>`;
      document.body.appendChild(div);
      const loader = new SVGLoader();
      const data = loader.parse(div.querySelector('svg').outerHTML);
      document.body.removeChild(div);

      const allPoints = [];
      data.paths.forEach(path => {
        const shapes = path.toShapes(false);
        shapes.forEach(shape => {
          const pts = shape.getSpacedPoints(Math.ceil(count / data.paths.length));
          pts.forEach(p => allPoints.push(new THREE.Vector3(
            (p.x - 50) * scale / 50,
            -(p.y - 50) * scale / 50,
            (Math.random() - 0.5) * 0.15 * scale
          )));
        });
      });

      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const p = allPoints[i % allPoints.length];
        positions[i * 3] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;
      }
      return positions;
    }

    // 预生成所有形状数据（使用新的采样逻辑）
const shapes = [];
for (let i = 0; i < 16; i++) {
    // 使用增强采样，轮廓占比65%
    shapes.push(sampleEnhancedSVG(svgPaths[i], 0.65, MAIN, SHAPE_SCALE));
}

    // ==================== 颜色 ====================
    function galaxyColor(dist, maxR) {
      const t = Math.min(dist / maxR, 1);
      const a = new THREE.Color('#fff8e7'),
        b = new THREE.Color('#ffb347');
      const c = new THREE.Color('#9966cc'),
        d = new THREE.Color('#4466aa');
      if (t < 0.15) return a.clone().lerp(b, t / 0.15);
      if (t < 0.5) return b.clone().lerp(c, (t - 0.15) / 0.35);
      return c.clone().lerp(d, (t - 0.5) / 0.5);
    }

    function shapeColor() {
      return new THREE.Color().setHSL(0.08 + Math.random() * 0.1, 0.6 + Math.random() * 0.35, 0.5 + Math.random() * 0.4);
    }

    // ==================== 粒子系统工厂 ====================
    function createSystem(count, scatter, tex, baseSize, opacity) {
      const pos = new Float32Array(count * 3);
      pos.set(scatter);
      const cols = new Float32Array(count * 3),
        sizes = new Float32Array(count);
      const gCols = new Float32Array(count * 3),
        sCols = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const x = scatter[i * 3],
          y = scatter[i * 3 + 1],
          z = scatter[i * 3 + 2];
        const d = Math.sqrt(x * x + y * y + z * z);
        const gc = galaxyColor(d, RADIUS * 1.5);
        gCols[i * 3] = gc.r;
        gCols[i * 3 + 1] = gc.g;
        gCols[i * 3 + 2] = gc.b;
        const sc = shapeColor();
        sCols[i * 3] = sc.r;
        sCols[i * 3 + 1] = sc.g;
        sCols[i * 3 + 2] = sc.b;
        cols[i * 3] = gc.r;
        cols[i * 3 + 1] = gc.g;
        cols[i * 3 + 2] = gc.b;
        sizes[i] = baseSize * (0.4 + Math.random() * 1.4);
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      geom.setAttribute('color', new THREE.BufferAttribute(cols, 3));
      geom.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      const mat = new THREE.PointsMaterial({
        size: baseSize,
        map: tex,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        depthTest: true,
        transparent: true,
        opacity,
        sizeAttenuation: true
      });
      return {
        points: new THREE.Points(geom, mat),
        geom,
        mat,
        positions: pos,
        colors: cols,
        sizes,
        gCols,
        sCols,
        scatter
      };
    }

    const main = createSystem(MAIN, galaxyPositions(MAIN, RADIUS), texMain, 0.05, 0.7);
    const mid  = createSystem(MID,  galaxyPositions(MID,  RADIUS * 0.9), texMid, 0.03, 0.75);
    const bg   = createSystem(BG,   galaxyPositions(BG,   RADIUS * 1.6), null,    0.015, 0.4);

    const mainGrp = new THREE.Group();
    mainGrp.add(main.points);
    scene.add(mainGrp);
    const midGrp = new THREE.Group();
    midGrp.add(mid.points);
    scene.add(midGrp);
    scene.add(bg.points);

    // ==================== 形状状态 ====================
    let curShape = 0,
      morph = 0.6,
      targetMorph = 0.6,
      trans = 1.0;
    const mainTarget = new Float32Array(MAIN * 3),
      mainCurr = new Float32Array(MAIN * 3),
      mainPrev = new Float32Array(MAIN * 3);
    const midTarget = new Float32Array(MID * 3),
      midCurr = new Float32Array(MID * 3),
      midPrev = new Float32Array(MID * 3);

    function setShape(idx, instant = false) {
      mainTarget.set(shapes[idx]);
      const midData = sampleSVGPath(svgPaths[idx], MID, SHAPE_SCALE * 0.65);
      midTarget.set(midData);
      if (instant) {
        mainCurr.set(shapes[idx]);
        mainPrev.set(shapes[idx]);
        midCurr.set(midData);
        midPrev.set(midData);
        trans = 1;
      } else {
        mainPrev.set(mainCurr);
        midPrev.set(midCurr);
        trans = 0;
      }
    }
    setShape(0, true);

    // ==================== 相机控制 ====================
    let theta = 0.3,
      phi = 1.2,
      tTheta = theta,
      tPhi = phi,
      autoRot = true,
      drag = false,
      pX, pY,
      vX = 0,
      vY = 0;

    function updCam() {
      const r = 12.5;
      camera.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
      camera.lookAt(0, 0, 0);
    }
    updCam();
    let lastPinchY = 0;
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  targetMorph = Math.max(0, Math.min(1, targetMorph + (e.deltaY > 0 ? -0.04 : 0.04)));
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
     if (e.touches.length === 2) {
    // 双指上下滑动 → 改变汇聚/散开程度
    e.preventDefault();
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    if (lastPinchY !== 0) {
      const delta = dy - lastPinchY;
      targetMorph = Math.max(0, Math.min(1, targetMorph - delta * 0.008));
    }
    lastPinchY = dy;
  } else if (drag && e.touches.length === 1) {
    e.preventDefault();
    moveDrag(e.touches[0].clientX, e.touches[0].clientY);
    lastPinchY = 0; // 单指时重置双指记录
  }
}, { passive: false });

    const startDrag = (x, y) => {
      drag = true;
      autoRot = false;
      pX = x;
      pY = y;
      document.body.classList.add('dragging');
    };
  const moveDrag = (x, y) => {
      if (!drag) return;
      const sens = isMobile ? 0.0025 : 0.004;
      tTheta -= (x - pX) * sens;
      tPhi -= (y - pY) * sens;
      tPhi = Math.max(0.1, Math.min(Math.PI - 0.1, tPhi));
      pX = x;
      pY = y;
      vX = -(x - pX) * 0.004;
      vY = -(y - pY) * 0.004;
    };
    const endDrag = () => {
      drag = false;
      document.body.classList.remove('dragging');
      if (Math.abs(vX) < 0.0005) autoRot = true;
    };

    renderer.domElement.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', endDrag);
    renderer.domElement.addEventListener('touchstart', e => {
      if (e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    renderer.domElement.addEventListener('touchend', () => {
  	if (drag) { /* 原有 endDrag 逻辑保持不变 */ }
 	 lastPinchY = 0;
    });

    // 滑块控制汇聚/散开
document.getElementById('morph-slider').addEventListener('input', e => {
  targetMorph = parseInt(e.target.value) / 100;
  const hint = document.getElementById('hint-overlay');
  if (hint && !hint.classList.contains('fading')) hint.classList.add('fading');
});

    // 形状按钮
    document.querySelectorAll('.shape-btn[data-shape]').forEach(b => b.addEventListener('click', () => {
      const idx = parseInt(b.dataset.shape);
      document.querySelectorAll('.shape-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      curShape = idx;
      setShape(idx);
      if (targetMorph < 0.15) targetMorph = 0.65;
    }));

    document.getElementById('panel-toggle').addEventListener('click', () => {
      document.getElementById('panel').classList.toggle('collapsed');
    });

    // ==================== 自定义文字 ====================
    const overlay = document.getElementById('text-overlay');
    document.getElementById('custom-btn').addEventListener('click', () => { overlay.classList.add('active'); });
    document.getElementById('cancel-btn').addEventListener('click', () => { overlay.classList.remove('active'); });
    document.getElementById('confirm-btn').addEventListener('click', () => {
      const text = document.getElementById('custom-text').value.trim();
      if (!text) return;

      const size = 1024;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
            // 保留手动换行，不再自动根据宽度拆分
      const lines = text.split('\n'); // 只按回车拆分

     let fs = 220;
     const fontFamily = isMobile
	? '"KaiTi","STKaiti","楷体","华文楷体","Noto Serif SC",cursive'
	: '"STXingkai","KaiTi","楷体",cursive';
      ctx.font = `${fs}px ${fontFamily}`;
      const maxW = size * 0.85;

      // 动态调整字号，确保每一行的宽度都不超过画布
      while (lines.some(line => ctx.measureText(line).width > maxW) && fs > 30) {
        fs -= 10;
        ctx.font = `${fs}px ${fontFamily}`;
      }

      // 如果行数较多，也检查总高度
      const lineH = fs * 1.3;
      let totalH = lines.length * lineH;
      while (totalH > size * 0.8 && fs > 30) {
  	fs -= 10;
  	ctx.font = `${fs}px ${fontFamily}`;
  	totalH = lines.length * fs * 1.3;
      }
      const startY = size / 2 - (lines.length - 1) * fs * 1.3 / 2;
      lines.forEach((l, i) => ctx.fillText(l, size / 2, startY + i * fs * 1.3));

      const img = ctx.getImageData(0, 0, size, size);
      const pixels = [];
      for (let y = 0; y < size; y++)
        for (let x = 0; x < size; x++)
          if (img.data[(y * size + x) * 4 + 3] > 60) pixels.push({ x, y });

      const data = new Float32Array(MAIN * 3);
      const half = size / 2,
        norm = SHAPE_SCALE / half;
      for (let i = 0; i < MAIN; i++) {
        const p = pixels[i % pixels.length];
        data[i * 3] = (p.x - half) * norm;
        data[i * 3 + 1] = -(p.y - half) * norm;
        data[i * 3 + 2] = (Math.random() - 0.5) * 0.2 * SHAPE_SCALE;
      }
      mainTarget.set(data);
      mainPrev.set(mainCurr);
      mainCurr.set(data);
      trans = 0;

      const midData = new Float32Array(MID * 3);
      for (let i = 0; i < MID; i++) {
        const p = pixels[i % pixels.length];
        midData[i * 3] = (p.x - half) * norm * 0.65;
        midData[i * 3 + 1] = -(p.y - half) * norm * 0.65;
        midData[i * 3 + 2] = (Math.random() - 0.5) * 0.15 * SHAPE_SCALE;
      }
      midTarget.set(midData);
      midPrev.set(midCurr);
      midCurr.set(midData);

      curShape = -1;
      document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('custom-btn').classList.add('active');
      overlay.classList.remove('active');
      if (targetMorph < 0.15) targetMorph = 0.65;
    });

    // 键盘快捷键
    window.addEventListener('keydown', e => {
      const len = 16;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        const n = (curShape - 1 + len) % len;
        switchTo(n);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        const n = (curShape + 1) % len;
        switchTo(n);
      } else if (e.key === 'r' || e.key === 'R') {
        targetMorph = targetMorph > 0.5 ? 0 : 1;
      } else if (e.key === 'f' || e.key === 'F') {
        targetMorph = 0;
      } else if (e.key === 'g' || e.key === 'G') {
        targetMorph = 1;
      }
    });

    function switchTo(n) {
      document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector(`.shape-btn[data-shape="${n}"]`);
      if (btn) btn.classList.add('active');
      curShape = n;
      setShape(n);
      if (targetMorph < 0.15) targetMorph = 0.65;
    }

    // 窗口大小调整
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });

    // ==================== 缓动函数 ====================
    function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

    // ==================== 动画循环 ====================
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.1);

      // 形态过渡（散开 ↔ 汇聚）
      morph += (targetMorph - morph) * 0.015;

      // 形状切换过渡
      if (trans < 1) {
        trans += 0.045;
        if (trans >= 1) {
          trans = 1;
          mainCurr.set(mainTarget);
          midCurr.set(midTarget);
        } else {
          const t = ease(trans);
          for (let i = 0; i < MAIN * 3; i++) mainCurr[i] = mainPrev[i] + (mainTarget[i] - mainPrev[i]) * t;
          for (let i = 0; i < MID * 3; i++) midCurr[i] = midPrev[i] + (midTarget[i] - midPrev[i]) * t;
        }
      }

      const mp = morph;

     // 膨胀因子：mp<0.7 时形状先膨胀 0~80%
const expand = mp < 0.7 ? 1.0 + (0.7 - mp) / 0.7 * 1.5 : 1.0;

      for (let i = 0; i < MAIN; i++) {
  	const i3 = i * 3;
  	const sx = main.scatter[i3], sy = main.scatter[i3 + 1], sz = main.scatter[i3 + 2];
  	// 膨胀后的形状位置
  	const ex = mainCurr[i3] * expand;
  	const ey = mainCurr[i3 + 1] * expand;
  	const ez = mainCurr[i3 + 2] * expand;
  	// 加速向银河过渡
  	const eff = Math.min(mp * 1.5, 1.0);
  	main.positions[i3] = sx + (ex - sx) * eff;
  	main.positions[i3 + 1] = sy + (ey - sy) * eff;
  	main.positions[i3 + 2] = sz + (ez - sz) * eff;
  	// ...颜色更新保持不变
        main.colors[i3] = main.gCols[i3] + (main.sCols[i3] - main.gCols[i3]) * mp;
        main.colors[i3 + 1] = main.gCols[i3 + 1] + (main.sCols[i3 + 1] - main.gCols[i3 + 1]) * mp;
        main.colors[i3 + 2] = main.gCols[i3 + 2] + (main.sCols[i3 + 2] - main.gCols[i3 + 2]) * mp;
      }
      main.geom.attributes.position.needsUpdate = true;
      main.geom.attributes.color.needsUpdate = true;

      // 更新中层粒子
      for (let i = 0; i < MID; i++) {
  	const i3 = i * 3;
  	const sx = mid.scatter[i3], sy = mid.scatter[i3 + 1], sz = mid.scatter[i3 + 2];
  	const ex = midCurr[i3] * expand;
  	const ey = midCurr[i3 + 1] * expand;
  	const ez = midCurr[i3 + 2] * expand;
  	const eff = Math.min(mp * 1.5, 1.0);
  	mid.positions[i3] = sx + (ex - sx) * eff;
  	mid.positions[i3 + 1] = sy + (ey - sy) * eff;
  	mid.positions[i3 + 2] = sz + (ez - sz) * eff;
  	// ...颜色更新保持不变
        mid.colors[i3] = mid.gCols[i3] + (mid.sCols[i3] - mid.gCols[i3]) * mp;
        mid.colors[i3 + 1] = mid.gCols[i3 + 1] + (mid.sCols[i3 + 1] - mid.gCols[i3 + 1]) * mp;
        mid.colors[i3 + 2] = mid.gCols[i3 + 2] + (mid.sCols[i3 + 2] - mid.gCols[i3 + 2]) * mp;
      }
      mid.geom.attributes.position.needsUpdate = true;
      mid.geom.attributes.color.needsUpdate = true;

      // 动态调整粒子大小和辉光
      const sizeMul = isMobile ? 0.65 : 1.0;
      main.mat.size = (0.04 + mp * 0.10) * sizeMul;
      mid.mat.size = (0.02 + mp * 0.06) * sizeMul;
      bg.points.rotation.y += dt * 0.05;
      mainGrp.rotation.y += (1 - mp) * 0.16 * dt;
      midGrp.rotation.y += (1 - mp) * 0.13 * dt;

      // 相机自动旋转
      if (autoRot && !drag) {
        tTheta += 0.18 * dt;
        vX *= 0.88;
        vY *= 0.88;
      } else if (!drag && !autoRot) {
        tTheta += vX * dt;
        tPhi += vY * dt;
        tPhi = Math.max(0.1, Math.min(Math.PI - 0.1, tPhi));
        vX *= 0.9;
        vY *= 0.9;
        if (Math.abs(vX) < 0.0003) autoRot = true;
      }
      theta += (tTheta - theta) * 0.12;
      phi += (tPhi - phi) * 0.12;
      updCam();
      // 更新进度条
      document.getElementById('progress-bar-fill').style.height = (morph * 100) + '%';
// 同步滑块值（避免拖拽时被覆盖）
const slider = document.getElementById('morph-slider');
if (slider && document.activeElement !== slider) {
  slider.value = Math.round(morph * 100);
}
      // 动态 Bloom 强度
      bloom.strength = 0.3 + (1 - mp) * 1.2;

      composer.render();
    }

    requestAnimationFrame(animate);

    // 几秒后自动隐藏提示
    setTimeout(() => {
      const h = document.getElementById('hint-overlay');
      if (h) { h.classList.add('fading');
        setTimeout(() => h.remove(), 1500); }
    }, 6000);

    console.log('🌌 星尘·银河与灵兽 — 完整版已启动');
  </script>
