<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>红楼三境 · RMTI / 风月宝鉴 / 太虚幻境</title>
  <style>
    :root {
      --ink: #24170f;
      --muted: #715f4c;
      --paper: rgba(255, 250, 239, 0.92);
      --paper-solid: #fffaf0;
      --line: rgba(142, 105, 55, 0.36);
      --gold: #c8a35a;
      --gold-deep: #9d7431;
      --red: #8b2c2c;
      --red-soft: #b24a43;
      --jade: #809878;
      --shadow: 0 22px 80px rgba(38, 18, 8, 0.28);
      --song: "Noto Serif SC", "Songti SC", "STSong", "SimSun", "KaiTi", serif;
      --title: "ZCOOL XiaoWei", "Noto Serif SC", "STKaiti", "KaiTi", serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #17110d; color: var(--ink); font-family: var(--song); }
    body { overflow-x: hidden; }
    button, input { font: inherit; }
    .app-root { min-height: 100vh; background: #17110d; }
    .home-view {
      min-height: 100svh;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(31, 17, 10, 0.78) 0%, rgba(31, 17, 10, 0.18) 28%, rgba(31, 17, 10, 0.2) 72%, rgba(31, 17, 10, 0.62) 100%),
        linear-gradient(180deg, rgba(255, 250, 235, 0.05), rgba(30, 18, 9, 0.68)),
        url("RMTI.png") center / cover no-repeat;
    }
    .home-view::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 52% 50%, transparent 0 36%, rgba(38, 18, 8, 0.22) 62%, rgba(22, 12, 7, 0.6) 100%),
        url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 62c18-28 42-28 60 0s36 28 54 0' fill='none' stroke='%23b08a4d' stroke-opacity='.12' stroke-width='1'/%3E%3C/svg%3E");
    }
    .home-panel {
      position: relative;
      z-index: 2;
      min-height: 100svh;
      display: grid;
      grid-template-columns: minmax(220px, 360px) 1fr;
      gap: 24px;
      padding: clamp(18px, 4vw, 54px);
      align-items: stretch;
    }
    .home-copy {
      align-self: center;
      max-width: 360px;
      color: #f7eddb;
      text-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }
    .home-copy h1 {
      margin: 0;
      font-family: var(--title);
      font-size: clamp(2.4rem, 7vw, 5.8rem);
      line-height: 0.96;
      letter-spacing: 0.08em;
      writing-mode: vertical-rl;
      max-height: 72svh;
    }
    .home-copy p {
      margin: 22px 0 0;
      max-width: 19rem;
      color: rgba(255, 245, 224, 0.86);
      line-height: 1.9;
      letter-spacing: 0.08em;
      font-size: clamp(0.82rem, 1.4vw, 0.98rem);
    }
    .home-stage { position: relative; min-height: 560px; }
    .hotspot {
      position: absolute;
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      color: #f8ead0;
      filter: drop-shadow(0 16px 22px rgba(28, 12, 5, 0.38));
      transition: transform 0.28s ease, filter 0.28s ease;
    }
    .hotspot:hover, .hotspot:focus-visible { transform: translateY(-6px) scale(1.03); filter: drop-shadow(0 18px 28px rgba(80, 28, 16, 0.48)); outline: none; }
    .hotspot img { display: block; width: min(24vw, 230px); max-width: 100%; height: auto; }
    .hotspot span {
      display: block;
      margin-top: -12px;
      padding: 8px 12px;
      background: rgba(42, 20, 10, 0.72);
      border: 1px solid rgba(218, 179, 99, 0.45);
      box-shadow: 0 8px 26px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
      letter-spacing: 0.14em;
      font-size: 0.88rem;
      text-align: center;
      white-space: nowrap;
    }
    .hotspot.rmti { left: 0%; bottom: 6%; }
    .hotspot.mirror { right: 13%; top: 20%; }
    .hotspot.paradox { left: 39%; top: 31%; }
    .home-note {
      position: absolute;
      right: 0;
      bottom: 2.5rem;
      z-index: 2;
      max-width: 360px;
      padding: 18px 20px;
      color: rgba(255, 244, 222, 0.9);
      background: linear-gradient(135deg, rgba(48, 24, 12, 0.72), rgba(80, 36, 24, 0.48));
      border: 1px solid rgba(219, 181, 105, 0.38);
      line-height: 1.8;
      letter-spacing: 0.07em;
      box-shadow: 0 18px 60px rgba(20, 10, 6, 0.28);
      backdrop-filter: blur(12px);
    }
    .view-shell { display: none; min-height: 100svh; position: relative; background: #efe3ce; }
    .view-shell.active { display: block; }
    .back-home {
      position: fixed;
      z-index: 1000;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      border: 1px solid rgba(203, 166, 90, 0.55);
      background: rgba(35, 18, 10, 0.62);
      color: #f7e8c9;
      border-radius: 999px;
      padding: 9px 15px;
      cursor: pointer;
      letter-spacing: 0.08em;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 34px rgba(0,0,0,0.18);
    }
    .back-home:hover { background: rgba(55, 27, 15, 0.78); }
    .loading-state, .error-state {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #f7e8d0;
      background: radial-gradient(circle at 50% 30%, #53342b, #16100e 70%);
      text-align: center;
      letter-spacing: 0.08em;
      line-height: 1.8;
    }

    .rmti-app {
      min-height: 100svh;
      padding: 54px 14px 26px;
      background:
        linear-gradient(rgba(239, 226, 204, 0.76), rgba(239, 226, 204, 0.78)),
        url("RMTI.png") center / cover fixed no-repeat;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      line-height: 1.8;
      letter-spacing: 0.04em;
    }
    .rmti-container {
      width: min(880px, 100%);
      background: rgba(255, 251, 241, 0.94);
      border: 1px solid rgba(156, 118, 65, 0.38);
      box-shadow: var(--shadow), inset 0 0 0 8px rgba(196, 154, 82, 0.05);
      padding: clamp(20px, 4vw, 42px);
      position: relative;
      overflow: hidden;
    }
    .rmti-container::before, .rmti-container::after {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(166, 124, 46, 0.18);
      pointer-events: none;
    }
    .rmti-container::after { inset: 18px; border-style: dotted; }
    .rmti-content { position: relative; z-index: 1; }
    .rmti-header { text-align: center; margin-bottom: 28px; }
    .rmti-seal, .rmti-badge {
      display: inline-block;
      border: 2px solid var(--red);
      color: var(--red);
      font-family: var(--title);
      padding: 3px 14px;
      letter-spacing: 0.16em;
      background: rgba(255, 244, 225, 0.58);
      transform: rotate(-2deg);
    }
    .rmti-header h2, .rmti-header h1 {
      margin: 8px 0 4px;
      font-family: var(--title);
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: 0.1em;
      color: var(--ink);
    }
    .rmti-subtitle { color: var(--muted); font-style: italic; margin: 0; }
    .rmti-poem, .poem-block {
      background: linear-gradient(135deg, rgba(255, 250, 240, 0.82), rgba(247, 232, 205, 0.72));
      border: 1px dashed rgba(160, 124, 74, 0.55);
      color: var(--red-soft);
      padding: 14px 18px;
      margin: 18px auto;
      max-width: 620px;
      text-align: center;
      font-family: var(--title);
    }
    .rmti-btn, .rmti-app .btn {
      appearance: none;
      border: 1px solid rgba(160, 124, 74, 0.45);
      border-radius: 999px;
      padding: 11px 24px;
      background: rgba(255, 252, 245, 0.86);
      color: var(--ink);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }
    .rmti-btn:hover, .rmti-app .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(93, 50, 18, 0.12); }
    .rmti-btn.primary, .rmti-app .btn.primary {
      background: linear-gradient(135deg, #a53d38, #842827);
      border-color: #842827;
      color: #fff9ec;
      letter-spacing: 0.12em;
    }
    .rmti-progress { margin-bottom: 20px; }
    .rmti-progress-track { height: 5px; background: #e1d1b8; border-radius: 999px; overflow: hidden; }
    .rmti-progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, #9a2f2d, #c6a251); transition: width 0.35s ease; }
    .rmti-progress-text { text-align: right; color: var(--muted); font-size: 0.78rem; margin-top: 5px; }
    .rmti-question-card {
      position: relative;
      min-height: 246px;
      padding: clamp(18px, 4vw, 30px);
      border: 1px solid rgba(159, 124, 75, 0.36);
      background:
        linear-gradient(rgba(255, 251, 240, 0.86), rgba(255, 249, 236, 0.9)),
        radial-gradient(circle at 18% 20%, rgba(179, 68, 63, 0.13), transparent 32%),
        radial-gradient(circle at 88% 78%, rgba(128, 152, 120, 0.16), transparent 34%),
        url("assets/vase-patterns.png") center / cover;
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.34);
      overflow: hidden;
    }
    .rmti-question-card::before {
      content: attr(data-chapter);
      position: absolute;
      right: 18px;
      top: 18px;
      color: rgba(139, 44, 44, 0.22);
      font-family: var(--title);
      font-size: clamp(2.2rem, 10vw, 4.8rem);
      writing-mode: vertical-rl;
      pointer-events: none;
    }
    .rmti-scene { color: var(--gold-deep); font-family: var(--title); margin-bottom: 10px; }
    .rmti-qtext {
      margin: 0 0 18px;
      padding-left: 14px;
      border-left: 3px solid rgba(189, 151, 72, 0.62);
      font-weight: 600;
      font-size: clamp(0.98rem, 2.4vw, 1.16rem);
    }
    .rmti-options { display: grid; gap: 10px; }
    .rmti-option {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(185, 153, 105, 0.42);
      background: rgba(255, 253, 247, 0.84);
      padding: 13px 14px;
      cursor: pointer;
      color: var(--ink);
      line-height: 1.65;
    }
    .rmti-option:hover, .rmti-option.selected {
      border-color: rgba(156, 54, 49, 0.65);
      background: rgba(255, 246, 230, 0.94);
      box-shadow: inset 3px 0 0 rgba(156, 54, 49, 0.5);
    }
    .rmti-label {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      margin-right: 9px;
      border-radius: 50%;
      background: #e6d4b8;
      color: var(--red);
      font-size: 0.78rem;
    }
    .rmti-nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 22px; flex-wrap: wrap; }
    .result-type { text-align: center; margin-bottom: 22px; }
    .result-type h2 { font-family: var(--title); font-size: clamp(1.6rem, 5vw, 2.4rem); margin: 8px 0 4px; }
    .result-type .tags { color: var(--muted); margin: 0; }
    .result-card, .methodology {
      background: rgba(255, 250, 240, 0.82);
      border: 1px solid rgba(170, 135, 86, 0.34);
      padding: 18px;
      margin: 14px 0;
      box-shadow: 0 8px 24px rgba(80, 42, 13, 0.06);
    }
    .result-card h3, .methodology h2, .methodology h3 { font-family: var(--title); color: var(--gold-deep); }
    .verse { white-space: normal; color: var(--red-soft); font-family: var(--title); line-height: 1.7; }
    .dimension-bars { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .dim-bar { background: rgba(239, 226, 203, 0.65); padding: 11px 12px; }
    .dim-label, .dim-values { font-size: 0.78rem; color: var(--muted); display: flex; justify-content: space-between; gap: 10px; }
    .track { height: 5px; border-radius: 999px; background: #decdb5; overflow: hidden; margin-top: 6px; }
    .fill-dim { height: 100%; }
    .fill-ei { background: #b3443f; } .fill-ns { background: #a67c2e; } .fill-tf { background: #735e4c; } .fill-jp { background: #872b2b; }
    .counter { display: none; }

    .mirror-app {
      min-height: 100svh;
      padding: 56px 16px 28px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(209, 168, 86, 0.12), transparent 36%),
        linear-gradient(180deg, #130c0b, #080609 72%);
      color: #ddc796;
      overflow: hidden;
      position: relative;
      user-select: none;
    }
    .mirror-app::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.2;
      background: url("RMTI.png") center / cover no-repeat;
      filter: sepia(0.8) brightness(0.45) contrast(1.12);
    }
    .mirror-starfield { position: absolute; inset: 0; pointer-events: none; }
    .star-dust { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: #d2ae60; animation: floatDust linear infinite; opacity: 0; }
    @keyframes floatDust { 0% { transform: translateY(0) scale(.3); opacity: 0; } 10% { opacity: .65; } 100% { transform: translateY(-100vh) scale(.15); opacity: 0; } }
    .mirror-container { position: relative; z-index: 2; display: grid; justify-items: center; gap: 13px; width: min(100%, 560px); }
    .mirror-title { text-align: center; }
    .mirror-title h2 { margin: 0; color: #f1cc70; font-family: var(--title); letter-spacing: 0.24em; font-size: clamp(1.6rem, 7vw, 2.4rem); }
    .mirror-subtitle { color: rgba(222, 199, 150, 0.62); font-size: 0.8rem; letter-spacing: 0.18em; margin-top: 4px; }
    .mode-indicator { margin-top: 6px; display: inline-block; border: 1px solid rgba(219, 180, 98, 0.4); padding: 4px 14px; border-radius: 999px; font-size: 0.75rem; letter-spacing: 0.14em; }
    .mode-dark { color: #e7aaa0; border-color: rgba(205, 92, 82, 0.45); }
    .canvas-wrapper {
      width: clamp(280px, min(86vw, 58vh), 480px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(218, 177, 95, 0.36);
      box-shadow: 0 0 70px rgba(197, 141, 58, 0.22), inset 0 0 32px rgba(255, 230, 150, 0.08);
      overflow: hidden;
      background: radial-gradient(circle, #2d2112, #090708 78%);
    }
    #oracleCanvas { display: block; width: 100%; height: 100%; border-radius: 50%; }
    .button-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
    .mirror-btn, .cert-btn {
      border: 1px solid rgba(212, 169, 83, 0.5);
      background: rgba(38, 25, 13, 0.72);
      color: #dfc892;
      padding: 9px 18px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.12em;
      backdrop-filter: blur(8px);
    }
    .mirror-btn:hover, .cert-btn:hover { background: rgba(66, 40, 18, 0.84); }
    .mirror-btn.active { color: #f0b7ad; border-color: rgba(210, 88, 80, 0.58); background: rgba(65, 22, 21, 0.8); }
    .hint-text { color: rgba(222, 199, 150, 0.48); font-size: 0.72rem; letter-spacing: 0.14em; text-align: center; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      background: rgba(4, 3, 5, 0.82);
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      z-index: 250;
      transition: opacity 0.28s ease;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-panel {
      width: min(560px, 96vw);
      max-height: min(86vh, 820px);
      overflow: auto;
      background: rgba(12, 8, 8, 0.96);
      border: 1px solid rgba(216, 175, 95, 0.34);
      color: #dcc796;
      padding: 22px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    .modal-panel.dark { border-color: rgba(203, 86, 80, 0.45); color: #d9b5aa; }
    .modal-title { font-family: var(--title); color: #f0ca68; font-size: 1.4rem; text-align: center; letter-spacing: 0.14em; }
    .dark .modal-title { color: #e89486; }
    .modal-sub { text-align: center; color: rgba(220, 199, 150, 0.58); margin: 5px 0 10px; }
    .modal-combo { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 10px 0; }
    .combo-item { border: 1px solid rgba(213, 170, 87, 0.36); padding: 5px 12px; border-radius: 999px; }
    .modal-section { white-space: pre-line; line-height: 1.8; font-size: 0.9rem; padding: 12px 13px; margin: 10px 0; background: rgba(255,255,255,0.035); border-left: 2px solid rgba(220, 176, 90, 0.5); }
    .dark .modal-section { border-left-color: rgba(205, 88, 80, 0.55); }
    .modal-grade { display: inline-block; margin: 8px auto; padding: 5px 14px; border: 1px solid currentColor; border-radius: 999px; }
    .grade-ji { color: #f0ca68; } .grade-banji { color: #d5b25f; } .grade-xiong { color: #d58d80; }

    .paradox-app {
      min-height: 100svh;
      position: relative;
      overflow: hidden;
      background: #160f1d;
      color: #e8d8f0;
      touch-action: manipulation;
    }
    .paradox-app canvas { display: block; width: 100%; height: 100%; }
    .paradox-hud {
      position: fixed;
      z-index: 20;
      pointer-events: none;
      color: #ead6b8;
      text-shadow: 0 0 14px rgba(80, 42, 12, 0.9);
      letter-spacing: 0.1em;
    }
    .paradox-info { left: max(16px, env(safe-area-inset-left)); top: calc(max(52px, env(safe-area-inset-top)) + 18px); line-height: 1.8; font-size: 0.88rem; }
    .paradox-incense { right: max(16px, env(safe-area-inset-right)); top: calc(max(52px, env(safe-area-inset-top)) + 18px); text-align: right; }
    .incense-meter { width: 76px; height: 5px; margin: 6px 0 0 auto; background: rgba(255,255,255,0.18); overflow: hidden; border-radius: 999px; }
    .incense-meter span { display: block; height: 100%; background: linear-gradient(90deg, #8b2c2c, #e2bd69); width: 0%; }
    .paradox-entropy { left: 50%; bottom: max(18px, env(safe-area-inset-bottom)); transform: translateX(-50%); background: rgba(31, 17, 38, 0.58); border: 1px solid rgba(214, 177, 119, 0.28); border-radius: 999px; padding: 8px 18px; }
    .paradox-message { position: fixed; z-index: 30; top: 34%; left: 50%; transform: translate(-50%, -50%); width: min(760px, 88vw); text-align: center; color: #fff2dc; opacity: 0; transition: opacity 0.35s ease; pointer-events: none; font-style: italic; line-height: 1.8; text-shadow: 0 0 20px rgba(0,0,0,0.62); }
    .temptation-pulse { position: fixed; z-index: 35; width: 24px; height: 24px; border-radius: 50%; display: none; background: radial-gradient(circle, #ffe2cb, #b14949 55%, transparent 70%); box-shadow: 0 0 34px #cf6f6f; animation: pulse 1.3s infinite; cursor: pointer; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.9); opacity: .32; } }
    .cert-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(58px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      background: rgba(13, 7, 18, 0.94);
      backdrop-filter: blur(22px);
      overflow: auto;
    }
    .cert-panel { width: min(720px, 96vw); max-height: 88vh; overflow: auto; text-align: center; border: 1px solid rgba(218, 178, 98, 0.3); padding: 24px; background: rgba(20, 12, 24, 0.82); box-shadow: 0 22px 80px rgba(0,0,0,0.38); }
    #cert-title { font-family: var(--title); font-size: clamp(2rem, 8vw, 3.6rem); color: #f3d28d; letter-spacing: 0.22em; }
    #cert-poem, #cert-quote { color: #f0dec4; line-height: 1.85; margin: 12px auto; max-width: 620px; }
    #cert-stats, #cert-analysis { color: #cdbdd8; line-height: 1.8; max-width: 620px; margin: 12px auto; text-align: left; }
    .paradox-fallback { min-height: 100svh; display: grid; place-items: center; padding: 24px; text-align: center; line-height: 1.8; background: radial-gradient(circle at 50% 35%, #422236, #120c16 76%); }

    @media (max-width: 760px) {
      .home-panel { grid-template-columns: 1fr; padding: 18px; }
      .home-copy { max-width: none; align-self: start; padding-top: 28px; }
      .home-copy h1 { writing-mode: horizontal-tb; font-size: clamp(2.2rem, 13vw, 4.2rem); max-height: none; }
      .home-copy p { max-width: 100%; margin-top: 12px; }
      .home-stage { min-height: 56svh; }
      .hotspot img { width: clamp(94px, 28vw, 150px); }
      .hotspot span { font-size: 0.74rem; padding: 6px 9px; }
      .hotspot.rmti { left: 2%; bottom: 7%; }
      .hotspot.mirror { right: 3%; top: 4%; }
      .hotspot.paradox { left: 38%; top: 34%; }
      .home-note { position: relative; right: auto; bottom: auto; margin-top: 14px; max-width: none; }
      .dimension-bars { grid-template-columns: 1fr; }
      .rmti-nav { justify-content: center; }
      .paradox-info { font-size: 0.74rem; top: 62px; }
      .paradox-incense { font-size: 0.74rem; top: 62px; }

  <script>
    const RMTI_AVAILABLE_IMAGES = [];
    const RMTI_METHODOLOGY_HTML = "<div class=\"methodology\">\n    <h2>📜 设计说明 · 学术依据</h2>\n    <p>本测试以《红楼梦》脂评本透露的“警幻情榜”为美学框架，融合荣格八维认知功能理论与现代人格心理学中的大五人格模型。脂砚斋评宝玉为“情不情”——以痴情体贴世间无知无识之物；评黛玉为“情情”——只将深情付与有情知己。曹雪芹以“情”为分类学，对人物情感类型进行细致划分，这在中国古典文学中被视为一种朴素而深刻的人格分类体系，与现代心理学的类型学思路不谋而合。</p>\n\n    <div class=\"poem-block\">\n        “开辟鸿蒙，谁为情种？都只为风月情浓。趁着这奈何天，伤怀日，寂寥时，试遣愚衷。因此上，演出这怀金悼玉的《红楼梦》。”<br>\n        <span style=\"font-size:0.7rem;\">—— 《红楼梦曲·引子》</span>\n    </div>\n\n    <h3>一、四大维度之构建</h3>\n    <p>参考人格心理学中能量来源、认知方式、判断方式与处世态度的经典四维模型，结合《红楼梦》独特的美学概念，我们将其重铸为具有红学气质的四组对立维度：</p>\n    <ul>\n        <li><strong>闹 / 静 —— 能量来源：</strong>“闹”如史湘云醉卧芍药裀，在人群的喧闹欢腾中汲取生命的活力；“静”如妙玉栊翠庵独品香茗，于静谧独处方见内心真境。《红楼梦》第四十九回“脂粉香娃割腥啖膻”写湘云雪地啖鹿肉之豪迈，恰是“闹”的极致；而第四十一回“栊翠庵茶品梅花雪”中妙玉以五年梅花雪水烹茶待客之孤洁，则堪称“静”的典范。</li>\n        <li><strong>空 / 象 —— 认知方式：</strong>“空”对应直觉感知——见落花而知离散，感四时之无常，从具象中提取抽象意义；“象”对应实感认知——见落花便去葬花，重具体经验与实物秩序，在可触可感的现实中安放情感。黛玉葬花虽以具象行为著称，其精神内核却是“空”的极致升华——“质本洁来还洁去”一句已是灵魂层面的叩问。</li>\n        <li><strong>情 / 理 —— 判断方式：</strong>“情”即以情感与价值为决策核心，如黛玉终身不曾劝宝玉走仕途经济之路，以内心感受为最高准则；“理”即以逻辑与事理为决策依据，如宝钗洞明世事，以最不伤人的理性路径处理复杂人情。脂评谓宝钗“博学宏览”而黛玉“以兰为心”，二者对照，尽显情、理之别。</li>\n        <li><strong>谨 / 逸 —— 处世态度：</strong>“谨”即计划性与秩序感，如袭人“心中只有一宝玉”，万事求周全妥帖，对宝玉的饮食起居、针黹衣物无不悉数在心；“逸”即灵活性与随性，如晴雯撕扇子作千金一笑，不愿被任何条框束缚，其随兴挥洒的姿态恰是魏晋风度的余韵流传。</li>\n    </ul>\n\n    <h3>二、人格类型之心理学与红学映射</h3>\n    <p>四组维度组合共形成十六种人格类型，其中十二种对应金陵十二钗之“情榜”评语，四种对应《红楼梦》中其他重要意象与情节。映射依据综合了红学界脂评研究、明代世情小说人格美学传统，及当代《红楼梦》人物心理学研究成果。每种人格均包含原著判词或诗句、脂砚斋批语考辨，以及荣格八维认知功能分析。</p>\n    <ul>\n        <li><strong>情不情 · 怡红公子</strong>（闹-空-情-逸 ）：对应贾宝玉,“情不情”出自脂砚斋甲戌本眉批，意谓以痴情体贴世间无知无识之物。热情不羁、厌恶束缚、以赤子之心对抗世俗。</li>\n        <li><strong>情情 · 潇湘妃子</strong>（静-空-情-逸 ）：对应林黛玉,“情情”指只对有情之人以情相待，情感深挚而专一。敏感、理想主义、忠于内在价值，以“质本洁来还洁去”为精神清洁的宣言。</li>\n        <li><strong>情敏 · 末世凤凰</strong>（闹-空-理-谨 ）：对应王熙凤,“机关算尽太聪明”精准刻画其认知锐度与战略思维。协理宁国府时立规矩、明赏罚，极富执行力与掌控欲。</li>\n        <li><strong>情冷 · 蘅芜君</strong>（静-空-理-谨 ）：对应薛宝钗,“任是无情也动人”之“无情”实为洞明世事之后的恒温理性，以最不伤人的路径抵达周全。</li>\n        <li><strong>情逸 · 枕霞旧友</strong>（闹-空-情-逸 ）：对应史湘云,“幸生来，英豪阔大宽宏量”一扫贵族少女的哀怨，是中国古典文学中罕见的阳光型人格典型。</li>\n        <li><strong>情清 · 槛外人</strong>（静-象-情-谨 ）：对应妙玉,“太高人愈妒，过洁世同嫌”概括了其对内在秩序近乎偏执的坚守与精神洁癖。</li>\n        <li><strong>情烈 · 玉山倾</strong>（闹-象-情-逸 ）：对应尤三姐,“揉碎桃花红满地”是刚烈之情的终极写照，活在当下，宁为玉碎，不为瓦全。</li>\n        <li><strong>情贤 · 花气袭人</strong>（静-象-情-谨 ）：对应袭人,“枉自温柔和顺”刻画了守护型人格的周全与缜密，以最精细的心思照顾每个人的感受。</li>\n        <li><strong>情勇 · 蕉下客</strong>（闹-象-理-谨 ）：对应贾探春,“才自精明志自高”直指其执行力与行动力，挽大厦于将倾的改革家气魄。</li>\n        <li><strong>情美 · 霁月彩云</strong>（静-象-情-逸 ）：对应晴雯,“霁月难逢，彩云易散”是不落地的天赋美，把本能活成艺术的极致美学人格。</li>\n        <li><strong>情枯 · 藕榭</strong>（静-空-理-逸 ）：对应贾惜春,“勘破三春景不长”指向理性超越与情感抽离，以冷眼观世寻求精神解脱。</li>\n        <li><strong>情幻 · 兼美</strong>（闹-空-情-逸 ）：对应秦可卿,“情天情海幻情身”揭示了以情感为纽带的人际编织能力，然过度承载他人期待终成幻灭。</li>\n        <li><strong>情痴 · 迷津渡者</strong>（静-象-理-逸 ）：源于第五回贾宝玉梦游太虚幻境中“迷津”意象。以深陷人情网络，警幻仙姑警示“此即迷津也，深有万丈”，须“遇有缘者渡之”。</li>\n        <li><strong>情网 · 红尘织梦者</strong>（静-空-理-逸 ）：源于“孽海情天”宫门对联“厚地高天，堪叹古今情不尽”。以情为网、以梦为舟，乐在编织人间温暖，却也易作茧自缚。</li>\n        <li><strong>情隐 · 青埂峰下客</strong>（闹-象-情-谨 ）：源于第一回青埂峰顽石偈“无材可去补苍天，枉入红尘若许年”。外冷内热，以冷静观察者姿态隐于世间，在关键时刻悄然出手。</li>\n        <li><strong>情豪 · 醉金刚行侠</strong>（闹-象-理-逸 ）：源于第二十四回醉金刚倪二轻财尚义之事。脂评赞其“肝胆照人，岂得以市井无赖目之”。快意恩仇，不拘小节，市井之中自有真侠。</li>\n    </ul>\n\n    <h3>三、题目设计逻辑</h3>\n    <p>三十道题对应三十个关键情境，每题从《红楼梦》中的典型场景化出，四个选项分别指向四个维度的两极。情境设计参考了原著中元妃省亲（第十八回）、黛玉葬花（第二十七回）、海棠诗社（第三十七回）、芦雪广联句（第五十回）、探春理家（第五十五回）、寿怡红群芳开夜宴（第六十三回）、抄检大观园（第七十四回）、凹晶馆联诗（第七十六回）、宝玉梦游太虚（第五回）、金钏投井（第三十二回）、鸳鸯抗婚（第四十六回）、香菱学诗（第四十八回）、龄官画蔷（第三十回）、琉璃世界白雪红梅（第四十九回）等诸多关键章回。每题均为单选题，选择完毕后系统根据四维计分规则，自动判定受测者的最终人格类型。</p>\n\n    <h3>四、学术渊源与参考依据</h3>\n    <p>本测试的学术来源包括但不限于：（1）《脂砚斋重评石头记》甲戌本、靖藏本批语汇编；（2）荣格《心理类型》之八维认知功能理论；（3）Costa &amp; McCrae之大五人格特质模型（NEO-PI-R）；（4）岳晓东《红楼心理诊所》之十二钗人格分析；（5）朱建军《红楼梦圆》之心理动力学解读；（6）孟泠含《INFP林黛玉》现代心理学讲座（2025）；（7）明代世情小说人格美学传统（以《金瓶梅》《红楼梦》为代表的类型化与个性化之辩证）。</p>\n\n    <h3>五、局限性声明</h3>\n    <p>任何类型学本质上都是对复杂人性的简化。《红楼梦》人物的伟大之处，正在于其超越了任何单一标签的框定。正如脂砚斋所批：“写黛玉是黛玉，写宝钗是宝钗，写湘云是湘云，各人各有一段真处。”本测试旨在以游戏的形式引导受测者关注古典文学与心理学的交汇之美，仅供自我探索与娱乐。若想真正理解红楼人物的丰富层次，还请回归原著，在曹雪芹“字字看来皆是血”的笔墨中寻找属于自己的答案。</p>\n</div>\n            <div class=\"poem-block\" style=\"text-align:center;\">\n                “说到辛酸处，荒唐愈可悲。由来同一梦，休笑世人痴！”<br>\n                <span style=\"font-size:0.7rem;\">—— 曹雪芹《题&lt;红楼梦&gt;》</span>\n            </div>\n            <p class=\"footnote\">满纸荒唐言，一把辛酸泪。都云作者痴，谁解其中味？<br>—— 曹雪芹《自题一绝》</p>\n            <div class=\"counter\" id=\"view-counter\">🌿 大观园来过 <span id=\"busuanzi_value_site_pv\"></span> 位访客</div>";

      const questions = [
                { id:1, scene: `【第一回】元妃省亲 · 大观园灯彩辉煌`, text: `元妃省亲之夜，大观园灯火通明、鼓乐喧天。元春题诗“衔山抱水建来精，多少工夫筑始成”，你更倾向于——`, image: `hlm_01_jia_zheng_feng_zhi_gui_fei_sheng_qin.jpg`, options: [

                { id:3, scene: `【第三回】海棠诗社 · 秋爽斋限韵`, text: `探春下了帖子邀你入海棠诗社，限韵咏白海棠。众人都在拈阄寻思……`, image: `hlm_03_qiu_shuang_zhai_ou_jie_hai_tang_she.jpg`, options: [
                    { text: `你第一个站起来，朗声道：“有了有了！”虽然不算最佳但胜在最快，博得满堂彩。`, dim: `E` },
                    { text: `你默默构思，反复推敲，直到最后才拿出一首“淡极始知花更艳”，众人皆惊。`, dim: `I` },
                    { text: `你觉得这诗社规矩太多，不如大家随意联句，像芦雪广那样即兴发挥才痛快。`, dim: `P` },
                    { text: `你主动承担了记录和誊抄的职责，把每一首诗都工工整整地抄在绢帛上。`, dim: `J` }
                ]},
                { id:4, scene: `【第四回】凤姐理事 · 宁国府点卯`, text: `王熙凤协理宁国府，有人迟到了片刻，她当众打了那人二十大板，阖府肃然……`, image: `hlm_04_wang_xi_feng_xie_li_ning_guo_fu.jpg`, options: [
                    { text: `心里暗暗佩服：这才是治家的手段，规矩不立不行，赏罚分明方成大器。`, dim: `T` },
                    { text: `觉得那人虽然该罚，但当众打板子实在太不留情面，心里有几分不忍。`, dim: `F` },
                    { text: `你注意到凤姐虽然面上严厉，但事后悄悄让人送了伤药过去——她其实心不冷。`, dim: `F` },
                    { text: `你仔细分析了宁国府的积弊，觉得凤姐只靠威刑恐非长久之策，还应修改制度本身。`, dim: `T` }
                ]},
                { id:5, scene: `【第五回】芦雪广联句 · 即景联诗`, text: `大雪天，众人聚在芦雪广即景联句，你一句我一句，场面热闹非凡……`, image: `hlm_05_lu_xue_ting_zheng_lian_ji_jing_shi.jpg`, options: [
                    { text: `你争着抢着要联下一句，哪怕抢跑了韵脚也乐在其中。`, dim: `P` },
                    { text: `你在心里默默排好了韵脚和节奏，等轮到自己时才从容不迫地接上。`, dim: `J` },
                    { text: `你联出了“沁梅香可嚼”这样奇崛的句子，众人拍案叫绝。`, dim: `N` },
                    { text: `你联的是“开门雪尚飘”——平实但准确，稳稳当当地接住了上句。`, dim: `S` }
                ]},
                { id:6, scene: `【第六回】宝玉梦游太虚幻境 · 薄命司`, text: `你在梦中来到一处仙宫，匾上写着“薄命司”三字，那副对联是“春恨秋悲皆自惹，花容月貌为谁妍”……`, image: `hlm_06_jia_bao_yu_shen_you_tai_xu_jing.jpg`, options: [
                    { text: `你感到一阵巨大的悲凉涌上来：原来一切早已注定，这些女子的命运早被写好了。`, dim: `N` },
                    { text: `你掀开册子一篇篇仔细翻看，想把每一幅画、每一句判词都记在心里。`, dim: `S` },
                    { text: `你觉得这不过是梦而已，醒来后该怎样还怎样，倒也不必太过挂怀。`, dim: `T` },
                    { text: `你为那些素不相识的女子流下泪来，心里堵得慌，久久不能平复。`, dim: `F` }
                ]},
                { id:7, scene: `【第七回】金钏投井 · 王夫人房中`, text: `金钏儿投井自尽的消息传来，王夫人正在房中垂泪，说都是自己的罪过……`, image: `hlm_07_jin_chuan_tou_jing.jpg`, options: [
                    { text: `你觉得首要之事是安抚王夫人，建议多赏些银子给金钏家人，妥善了结后事。`, dim: `T` },
                    { text: `你心里涌起一阵酸楚：一个鲜活的生命就这样没了，多赏银两又如何能弥补？`, dim: `F` },
                    { text: `你默默想着：井底胭脂冷，人间岁月长。这荣国府里，还有多少看不见的眼泪。`, dim: `N` },
                    { text: `你立即去查问当日是谁当值、金钏被撵的具体经过，想弄清楚事情的全貌。`, dim: `S` }
                ]},
                { id:8, scene: `【第八回】探春理家 · 兴利除弊`, text: `探春暂代凤姐管家，打算在大观园推行“承包制”——将园子里的花草树木分包给婆子们打理……`, image: `hlm_08_min_tan_chun_xing_li_chu_su_bi.jpg`, options: [
                    { text: `你觉得这主意极好！与其墨守成规，不如放手一试，说不定能闯出一条新路。`, dim: `P` },
                    { text: `你先问了详细的章程：谁来管？怎么分账？出了差错谁来承担？把这些都想清楚再表态。`, dim: `J` },
                    { text: `你从情感上很支持探春——一个庶出的姑娘敢做这样的改革，太不容易了。`, dim: `F` },
                    { text: `你冷静地分析了利弊：承包制固然开源节流，但会不会引发婆子们之间的争斗？`, dim: `T` }
                ]},
                { id:9, scene: `【第九回】寿怡红群芳开夜宴 · 掣花签`, text: `宝玉生日之夜，众人关了院门，掣花签饮酒。轮到你了，花签上写着——`, image: `hlm_09_yi_hong_ye_yan_tu.jpg`, options: [
                    { text: `不管签上写的什么，你第一个举杯：“喝就是了！”满座都跟着你热闹起来。`, dim: `E` },
                    { text: `你仔细端详签上的诗句，反复咀嚼其含义，心想这签怎么像是说中了我的心事呢。`, dim: `I` },
                    { text: `你看到签上画的是牡丹，立刻想起宝钗“任是无情也动人”——这花签有深意啊。`, dim: `N` },
                    { text: `你注意到今晚的酒是惠泉酒，杯子是海棠冻石蕉叶杯，这些细节让人觉得分外惬意。`, dim: `S` }
                ]},
                { id:10, scene: `【第十回】黛钗金兰契 · 互剖金兰语`, text: `秋窗风雨夕，黛玉病中，宝钗前来探望，两人互剖心迹。黛玉感念道：“东西事小，难得你多情如此。”`, image: `hlm_10_jin_lan_qi_hu_pou_jin_lan_yu.jpg`, options: [
                    { text: `你深深感动于这一刻的真情流露：两个平日里各自骄傲的人，终于放下了防备。`, dim: `F` },
                    { text: `你注意到宝钗送的是燕窝而非人参——燕窝性平润肺，人参性热不宜黛玉体质，用药般的精准。`, dim: `T` },
                    { text: `你觉得人与人之间能这样坦诚相对，真是难得。希望自己也能有这样的知己。`, dim: `E` },
                    { text: `你更愿意保持适当的距离，太过亲密的关系反而让人不安。`, dim: `I` }
                ]},
                { id:11, scene: `【第十一回】抄检大观园 · 夜里忽然查抄`, text: `王善保家的带着人抄检大观园，查到你的住处时，所有人都在看着……`, image: `hlm_11_huo_jian_chan_chao_jian_da_guan_yuan.jpg`, options: [
                    { text: `你“豁啷”一声把箱子倒扣在地上：“都拿去吧！”——宁可玉碎，不为瓦全。`, dim: `P` },
                    { text: `你冷静地打开箱子，一件一件摆出来让人查看，面上不动声色，心里却记下了这笔账。`, dim: `J` },
                    { text: `你觉得这是对自己人格的极大侮辱，就算过后证明清白，心里的刺也拔不掉了。`, dim: `F` },
                    { text: `你迅速判断了形势：这是大房和二房之间的内斗波及到自己，冷静应对才是上策。`, dim: `T` }
                ]},
                { id:12, scene: `【第十二回】凹晶馆联诗 · 中秋夜月`, text: `中秋之夜，黛玉和湘云在凹晶馆联诗。“寒塘渡鹤影，冷月葬花魂。”——你听到这两句……`, image: `hlm_12_ao_jing_guan_lian_shi_bei_ji_mo.jpg`, options: [
                    { text: `你被这两句诗击中了——太好的诗，但太过悲凉。忍不住也想要吟一句。`, dim: `E` },
                    { text: `你默然良久，心里反复咀嚼“冷月葬花魂”五个字，久久不能言语。`, dim: `I` },
                    { text: `你觉得湘云的“寒塘渡鹤影”其实更好——有动有静，有冷有热，还有一丝洒脱。`, dim: `N` },
                    { text: `你注意到今夜月色虽好，但池水已经有些凉了，该提醒两位姑娘早些回去添衣。`, dim: `S` }
                ]},
                { id:13, scene: `【第十三回】荣国府元宵开夜宴`, text: `元宵夜宴，贾母命摆上陈设，满堂子孙绕膝。戏台上正唱得热闹，你却——`, image: `hlm_13_rong_guo_fu_yuan_xiao_kai_ye_yan.jpg`, options: [
                    { text: `坐到最前排，和众姊妹一起猜灯谜、行酒令，笑得最大声。`, dim: `E` },
                    { text: `拣了个靠窗的位子，看着外面的烟火，觉得比戏台上的更有味道。`, dim: `I` },
                    { text: `你注意到今晚的戏单上有《牡丹亭》，暗想这等浓词艳曲与贾府气象是否相合。`, dim: `N` },
                    { text: `你默默数了数今晚共上了多少道菜肴，又记下哪些菜贾母多夹了两箸。`, dim: `S` }
                ]},
                { id:14, scene: `【第十四回】香菱学诗 · 黛玉论诗`, text: `香菱向黛玉学诗，黛玉说出“词句究竟还是末事，第一立意要紧”的话，又举“大漠孤烟直，长河落日圆”为例。`, image: `hlm_14_xiang_ling_xue_shi.jpg`, options: [
                    { text: `你深以为然：作诗如此，做人亦如此——若无真性情，辞藻再华丽也是虚的。`, dim: `N` },
                    { text: `你觉得初学还是先练基本功，把平仄对仗练熟了再来谈立意不迟。`, dim: `S` },
                    { text: `你被香菱的痴劲儿打动了，主动帮她改了几处韵脚，逐字讲解。`, dim: `F` },
                    { text: `你为香菱列了一份循序渐进的书单：先读王维五律，次读杜甫七律……`, dim: `T` }
                ]},
                { id:15, scene: `【第十五回】鸳鸯抗婚 · 断发明志`, text: `鸳鸯当着众人剪下一缕头发，哭着发出此生不嫁的誓言……`, image: `hlm_15_yuan_yang_nv_shi_jue_yuan_yang_ou.jpg`, options: [
                    { text: `你从心底里敬佩她：宁死不屈，用最激烈的方式守护自己的尊严。`, dim: `F` },
                    { text: `你冷静想了一下：鸳鸯此举固然壮烈，但恐怕会触怒贾赦，后面更难周全。`, dim: `T` },
                    { text: `你觉得这贾府表面繁华，底下却藏着多少这样的肮脏事，一时悲从中来。`, dim: `N` },
                    { text: `你留意到贾母的反应——她真正动怒了，这场闹剧最终还得由老太太来收场。`, dim: `S` }
                ]},
                { id:16, scene: `【第十六回】枕霞阁史湘云做东`, text: `湘云要起诗社做东，宝钗帮她安排了螃蟹宴。湘云即兴作了“萧疏篱畔科头坐，清冷香中抱膝吟”。`, image: `hlm_16_pang_xie_yan.jpg`, options: [
                    { text: `一大早就跑去帮忙，不拘做什么，凑热闹最要紧。`, dim: `P` },
                    { text: `提前问清时间、地点、与会人名单，心里盘算好当日自己的行程。`, dim: `J` },
                    { text: `你为湘云的热情所感染，觉得真心可贵，自己也想尽一份力。`, dim: `F` },
                    { text: `你估算了螃蟹宴的花费，心里暗暗计算这顿饭大概要吃掉一个庄稼人一年的嚼用。`, dim: `T` }
                ]},
                { id:17, scene: `【第十七回】栊翠庵品茶 · 妙玉奉茶`, text: `妙玉请宝钗黛玉喝体己茶，用“瓟斝”、“点犀䀉”等珍器，水是五年前梅花上的雪。`, image: `hlm_17_jia_bao_yu_pin_cha_long_cui_an.jpg`, options: [
                    { text: `你大方地询问茶器的来历，与妙玉谈茶论道，不觉间已说了许多话。`, dim: `E` },
                    { text: `你安静地品茶，观察妙玉泡茶的每一道工序，心里暗暗叹服她的品味。`, dim: `I` },
                    { text: `你注意到这两件器物名字古怪，暗含“班袍假体”等谶语——妙玉待客似有深意。`, dim: `N` },
                    { text: `你尝出这雪水与旧年蠲的雨水滋味确有不同，更轻浮甘洌。`, dim: `S` }
                ]},
                { id:18, scene: `【第十八回】茜纱窗下 · 晴雯撕扇`, text: `晴雯失手跌了扇子，宝玉说了她几句，她便冷笑道：“先时连那么样的玻璃缸、玛瑙碗不知弄坏了多少……”`, image: `hlm_18_qing_wen_si_shan.jpg`, options: [
                    { text: `你觉得晴雯这话里有更深的不满——不只是为扇子，是平日里积攒的委屈爆发了。`, dim: `N` },
                    { text: `你注意到那扇子原是湘妃竹骨、名人书画，确实可惜了。`, dim: `S` },
                    { text: `你赶紧打圆场，劝完宝玉又劝晴雯，不想看到他们争吵。`, dim: `F` },
                    { text: `你分析二人的性格冲突：一个太过随意，一个太过敏感，今日之事只是导火索。`, dim: `T` }
                ]},
                { id:19, scene: `【第十九回】敏探春兴利除宿弊`, text: `探春理家，赵姨娘的兄弟死了，探春按旧例赏了二十两银子。赵姨娘来闹，探春当众说：“我是按着旧规矩办。”`, image: `hlm_19_min_tan_chun_xing_li_chu_su_bi.jpg`, options: [
                    { text: `你心疼探春——她心里必定难受，那是她亲娘，可规矩在身，她不得不如此。`, dim: `F` },
                    { text: `你赞成探春：理家就该如此，若徇私情，往后谁还服她？制度比人情更重要。`, dim: `T` },
                    { text: `你从这件事看出探春对自己庶出身份的矛盾心态——她比任何人都想摆脱这个标签。`, dim: `N` },
                    { text: `你去查了旧账，发现赵国基的赏银确实按例是二十两，探春并未刻薄。`, dim: `S` }
                ]},
                { id:20, scene: `【第二十回】琉璃世界白雪红梅`, text: `下了大雪，众人相约明日去芦雪广赏雪联句。李纨说：“我才看见栊翠庵的红梅有趣。”`, image: `hlm_20_liu_li_shi_jie_bai_xue_hong_mei.jpg`, options: [
                    { text: `兴奋得睡不着，恨不得马上天亮，什么也不准备，明天披上斗篷就走。`, dim: `P` },
                    { text: `仔细检查了明日要穿的衣裳鞋袜，备好手炉和诗稿，又嘱咐丫鬟天亮前叫醒。`, dim: `J` },
                    { text: `你想着明天定要联出几句好诗，又想到可向妙玉乞红梅，更添雅趣。`, dim: `N` },
                    { text: `你回忆往年大雪的场景，把去年联句的记录翻出来，想看看有没有可借鉴的句子。`, dim: `S` }
                ]},
                { id:21, scene: `【第二十一回】龄官画蔷 · 蔷薇花架下`, text: `你偶然看见一个女孩子蹲在蔷薇花架下，拿簪子在地上反复画着一个字，画了几十个……`, image: `hlm_21_ling_guan_hua_qiang.jpg`, options: [
                    { text: `你忍不住走过去，想知道她画的是什么字，心里猜她一定有一段故事。`, dim: `E` },
                    { text: `你远远站着，不去打扰。这画面本身已经足够动人，不需再去追问。`, dim: `I` },
                    { text: `你觉得这女孩子心中似有无限的苦楚无法言说，只得用这种方式来排遣——太让人心酸了。`, dim: `N` },
                    { text: `你注意到她画的是“蔷”字，想起园子里有个叫贾蔷的，心里大概明白了。`, dim: `S` }
                ]},
                { id:22, scene: `【第二十二回】听曲文宝玉悟禅机`, text: `宝玉听《寄生草》后，写下“你证我证，心证意证。是无有证，斯可云证……”`, image: `hlm_22_ting_qu_wen_bao_yu_wu_chan_ji.jpg`, options: [
                    { text: `你读到这话，心里咯噔一下——这分明是对人生的终极追问，背后是巨大的虚无感。`, dim: `N` },
                    { text: `你觉得这不过是宝玉一时的痴话，受了戏文的熏染，过几日自然就忘了。`, dim: `S` },
                    { text: `你为宝玉这种状态感到担忧：他太容易陷入精神困境，需要有人把他拉出来。`, dim: `F` },
                    { text: `你逐句分析了他的偈子，觉得其实逻辑上漏洞不少，不过是强说愁而已。`, dim: `T` }
                ]},
                { id:23, scene: `【第二十三回】俏平儿情掩虾须镯`, text: `平儿的虾须镯丢了，发现是宝玉房里的小丫头坠儿偷的。平儿选择瞒下此事，只说是自己丢在草根底下。`, image: `hlm_23_qiao_ping_er_qing_yan_xia_xu_zhuo.jpg`, options: [
                    { text: `你觉得平儿真是善良：顾全了宝玉的脸面，又保住了坠儿的工作，只想大事化小。`, dim: `F` },
                    { text: `你虽理解平儿的好意，但偷窃毕竟是底线问题，若不处理，日后恐怕更难管束。`, dim: `T` },
                    { text: `你注意到平儿在说这件事时，特意避开了晴雯——她知道晴雯的脾气，怕闹大。`, dim: `S` },
                    { text: `你从中看到大观园管理上的漏洞：出入的人太多，贵重物品的保管制度形同虚设。`, dim: `T` }
                ]},
                { id:24, scene: `【第二十四回】勇晴雯病补雀金裘`, text: `宝玉的雀金裘烧了个洞，第二天舅老爷生日必须穿。晴雯正病着，却挣扎起来熬夜补裘……`, image: `hlm_24_yong_qing_wen_bing_bu_que_jin_qiu.jpg`, options: [
                    { text: `你被这一幕深深震撼——这不仅是手艺，更是拼命的情义。`, dim: `F` },
                    { text: `你觉得应该想个更周全的办法，比如连夜找人帮忙，或者另备一件衣裳，不该让病人硬撑。`, dim: `J` },

  const WX=['金','木','水','火','土'];

function wxRel(a,b){
    const ia=WX.indexOf(a),ib=WX.indexOf(b);
    if(ia===-1||ib===-1)return'平';
    const d=(ib-ia+5)%5;
    if(d===1)return'生'; if(d===2)return'克'; if(d===3)return'被生'; if(d===4)return'被克'; return'同';
  }

function wxDesc(rel,a,b){
    if(rel==='生')return `${a}生${b}（母生子，${a}之气滋养${b}之气）`;
    if(rel==='克')return `${a}克${b}（金伐木，${a}之性制约${b}之性）`;
    if(rel==='被生')return `${b}生${a}（子得母气，${b}反哺${a}）`;
    if(rel==='被克')return `${b}克${a}（外克内，${b}之气压迫${a}之气）`;
    if(rel==='同')return `${a}同${b}（五行同气，同性相吸亦相斥）`;
    return '五行交互不明';
  }

      { key:'体生用_耗散', rule:(pf)=>(pf==='生'), text:'锦上添花虽好，奈何根底已虚。你以本命之气滋养花签之美，看似繁盛，实则内耗。试着将注意力从外部收束，回到自己的内在秩序。' },
      { key:'用生体_滋养', rule:(pf)=>(pf==='被生'), text:'花气袭人知昼暖——你的命格正被花签悄然滋养。这细微的照料不求回报，却能使你走出悬溺的暗处。宜信赖这份善意，尝试将执着轻轻放下。' },
      { key:'体克用_主位', rule:(pf)=>(pf==='克'), text:'体克用则居于主位，如同迎春的根茎在冻土下暗自蓄力。你拥有不被花签牵引的定力，保持这份深度审慎，不被表象迷惑。' },
      { key:'用克体_逆风', rule:(pf)=>(pf==='被克'), text:'逆风执烛，心火难安。花签之气正在挑战你长久以来维持的秩序。但这正是审视自我的契机——哪些秩序该守，哪些其实是桎梏？' },
      { key:'体用比和_谐振', rule:(pf)=>(pf==='同'), text:'五行同气，你与花签如琴瑟和鸣。内在与外在达成暂时的和谐，情绪出现难得的松弛。珍惜这段平静，让它成为后续波折中的锚点。' },
      { key:'木生火_文思', rule:(p,f)=>(p==='木'&&f==='火'), text:'木生火——你的本命之木催生花签之火，文思如泉涌，情感亦炽烈。小心火势过旺烧及自身，宜适时退一步，以水（冷静）调之。' },
      { key:'火生土_沉淀', rule:(p,f)=>(p==='火'&&f==='土'), text:'火生土——燃烧过后，终将沉淀。你正在经历一场从激昂到沉稳的过渡。不必抗拒这个过程，厚德载物，土能容万物。' },
      { key:'土生金_积累', rule:(p,f)=>(p==='土'&&f==='金'), text:'土生金——厚积薄发，正是你此刻的状态。日复一日的坚持终将凝结成金。勿急于求成，金从矿出，耗时弥久。' },
      { key:'金生水_流转', rule:(p,f)=>(p==='金'&&f==='水'), text:'金生水——坚硬之物化为流动之形。你正在学会软化久筑的防御，让情感如水般流动。这不是软弱，是金之精华化入水中的升华。' },
      { key:'水生木_本源', rule:(p,f)=>(p==='水'&&f==='木'), text:'水生木——回归本源，生命初始的滋养来自情感之泉。你今日宜回到让你感到安全的原点汲取力量，澄水润枯根，转机已在悄悄萌动。' },
      { key:'木克土_破障', rule:(p,f)=>(p==='木'&&f==='土'), text:'木克土——根系穿透坚土。你正在突破长久压身的束缚，纵有钝痛，却是成长的必经之路。破土而出的那一天，阳光洒在新生的叶片上，一切都值得。' },
      { key:'土克水_堵防', rule:(p,f)=>(p==='土'&&f==='水'), text:'土克水——你用理智之堤拦住了情感之潮。防线固然重要，但适度放水泄洪，才能避免最终的决堤。允许自己偶尔失控，也是一种勇敢。' },
      { key:'水克火_降温', rule:(p,f)=>(p==='水'&&f==='火'), text:'水克火——以静制动，以冷制热。内心之火被外在之水平抑，你感到前所未有的冷静。虽然不够热闹，但这温度刚好适合阅读自己的心跳。' },
      { key:'火克金_淬炼', rule:(p,f)=>(p==='火'&&f==='金'), text:'火克金——烈火炼真金。当下的磨砺并非摧毁，而是在淬炼你最重要的品质。透过痛感，你会发现自己的纯度比想象中更高。' },
      { key:'金克木_修剪', rule:(p,f)=>(p==='金'&&f==='木'), text:'金克木——斧斫春枝，看似残忍，实则是为更茁壮的再生修剪。你正在失去某种美好的幻象，那是必要的减法，是摘掉一片早落的叶，好让新芽有光可照。' },
      { key:'两木比和_生机', rule:(p,f)=>(p==='木'&&f==='木'), text:'木木比和——双木成林，生机盎然。你遇到了与自己频率相同的人或事，彼此呼应。珍惜这段共鸣时刻，林中的每棵树都因彼此而更挺拔。' },
      { key:'两火比和_炽热', rule:(p,f)=>(p==='火'&&f==='火'), text:'火火比和——如双烛同燃。情感的浓度被放大，创作的冲动不可遏止。请在燃烧的同时为自己留一道防火墙，别让光芒以灼伤为代价。' },
      { key:'两土比和_敦厚', rule:(p,f)=>(p==='土'&&f==='土'), text:'土土比和——二土成圭，厚德载物。此刻最宜深耕而非急于收获。把每件小事做好，圭臬之器，由垒土而成。' },
      { key:'两金比和_精纯', rule:(p,f)=>(p==='金'&&f==='金'), text:'金金比和——双金相击，其声清越。你的理智与判断力正处于高效形态，不妨将这种锐利用于完善你的边界与计划。' },
      { key:'两水比和_深邃', rule:(p,f)=>(p==='水'&&f==='水'), text:'水水比和——百川汇海，你的直觉与情感流动得比平时更加深邃。独处时会有重要感悟浮现，宜静不宜闹。' },
      { key:'逆生_反哺', rule:(p,f)=>(p==='水'&&f==='金'), text:'金本生水，但在此盘中情势逆转——水反哺金，恩返源头。你今日可能会向一位曾帮助过你的人伸出援手，回馈的力量胜过索取。' },
      { key:'三行交战_乱', rule:()=>(true), text:'金木水火土互有生克，局面错综复杂。此刻不宜做重大决策，静观其变，待五行之气自然流转。乱中自有秩序，需要的只是耐心。' },
      { key:'缺金_收敛', rule:(p,f)=>(p!=='金'&&f!=='金'), text:'五行缺金，收敛之气不足。你今日可能感到边界模糊，难以果断。宜增加“拒绝”的练习，金为肃杀之气，适当的收束是对自我的保护。' },
      { key:'缺水_枯竭', rule:(p,f)=>(p!=='水'&&f!=='水'), text:'五行缺水，润泽不足。情感的泉眼似乎有些干涸。今日宜靠近水源——不论是实际的流水，还是能滋润你心灵的人与书。' },
      { key:'缺火_温吞', rule:(p,f)=>(p!=='火'&&f!=='火'), text:'五行缺火，热情暂伏。你在理性的冰面下藏着炽热的岩浆。不必急于燃烧，星点之火足以暖一室，慢慢来，保留住内在的温度。' }

    // ── 30种卦象启示 ──
    const ichingOracles = [
      { key:'乾健', template:(p)=>'乾卦之健——天行健，君子以自强不息。你当下正站在一个新的起点上，勿因花签所示之美好而忘乎所以，亦不因判词之沉而自轻。保持内在的进取力，日新其德。' },
      { key:'坤顺', template:(p)=>'坤卦之顺——地势坤，君子以厚德载物。你正需要学会承载与包容，承载自己的不完美，包容他人的局限。柔韧之力胜于刚强。' },
      { key:'屯始', template:(p)=>'屯卦始生——云雷屯，君子以经纶。万物始生之难，你此刻的迷茫正是成长的前奏。勿急于求成，萌芽破土需时日。' },
      { key:'蒙昧', template:(p)=>'蒙卦启蒙——山下出泉，君子以果行育德。你正处在一个需要重新学习的阶段，带着好奇心去感知，而非带着判断去批判。' },
      { key:'需待', template:(p)=>'需卦之待——云上于天，君子以饮食宴乐。耐心等待是最难的功课。不急，不躁，将小事做好，时机自会降临。' },
      { key:'讼辨', template:(p)=>'讼卦之辨——天与水违行，君子以作事谋始。你内心深处正经历一场辩论，两个声音在交锋。倾听双方的声音，最终你会发现它们其实是一体两面。' },
      { key:'师众', template:(p)=>'师卦之众——地中有水，君子以容民畜众。你宜集思广益，将周围人的善意转化为行动力。在群体中汲取力量，不必单打独斗。' },
      { key:'比亲', template:(p)=>'比卦之亲——地上有水，先王以建万国亲诸侯。今日适合加深与他人的联结，一段真诚的关系正在萌芽。愿意被看见，是亲密的开始。' },
      { key:'小畜_蓄', template:(p)=>'小畜卦之蓄——风行天上，君子以懿文德。你正在积蓄力量，虽然看似没有突破，实则如弓渐满。蓄力期的耐心决定了箭矢能飞多远。' },
      { key:'履险', template:(p)=>'履卦之险——上天下泽，君子以辨上下定民志。你正走在险途之上，如履虎尾，小心谨慎便是最好的护身符。宜低姿态，不宜高调行事。' },
      { key:'泰通', template:(p)=>'泰卦之通——天地交而万物通，上下交而其志同。你正处在一个畅通的状态中，此时最适合开诚布公，与人分享。通透的状态不会持续太久，珍惜当下。' },
      { key:'否塞', template:(p)=>'否卦之塞——天地不交而万物不通。你感到阻隔无处不在，言语难以抵达对方耳中。此时不宜强行突破，退而修德是唯一出路。' },
      { key:'同人_合', template:(p)=>'同人卦之合——天与火，君子以类族辨物。你正在寻找志同道合之人，而那个人可能已经在不远处了。打开你的感官，同类之间的引力无需刻意。' },
      { key:'大有_丰', template:(p)=>'大有卦之丰——火在天上，君子以遏恶扬善。你拥有一份相当珍贵的禀赋或机缘，它值得被谨慎对待。富有时最易失足，请务必将这份珍视化为每日的微行。' },
      { key:'谦卑', template:(p)=>'谦卦之卑——地中有山，君子以裒多益寡。你正处在谦卑的力量中，虽不高调，却稳如磐石。真正的力量从不喧哗。' },
      { key:'豫备', template:(p)=>'豫卦之备——雷出地奋，君子以作乐崇德。你内心有一件长久悬搁的事，此刻可以开始动身了。哪怕只是迈出第一步，豫备之力已然形成。' },
      { key:'随顺', template:(p)=>'随卦之顺——泽中有雷，君子以向晦入宴息。顺势而动，不为难自己。这股随顺的能量来自你对不确定性的接纳，而非对命运的屈服。' },
      { key:'蛊乱', template:(p)=>'蛊卦之乱——山下有风，君子以振民育德。你目前的状态存在一些混乱。但这恰是拨乱反正的时机，旧壳不碎裂，新机如何出？' },
      { key:'临观', template:(p)=>'临卦之观——泽上有地，君子以教思无穷。你宜站在高处俯视全局，而非陷在草木之间。临观之眼能让你看到那些被忽略的连接。' },
      { key:'观照', template:(p)=>'观卦之照——风行地上，先王以省方观民设教。你正在观察与被观察之间。观察的是世态，被观察的是内心。让这双重的视线清澈如初。' },
      { key:'噬嗑_断', template:(p)=>'噬嗑卦之断——雷电噬嗑，先王以明罚敕法。你面临一个需要做出果断抉择的节点。犹豫已然消散，吞下这口硬物，它将成为你身体的一部分。' },
      { key:'贲饰', template:(p)=>'贲卦之饰——山下有火，君子以明庶政无敢折狱。你正在用某种方式装饰自己的内在世界。外在的修饰无妨，但请确保内在的火光不曾熄灭。' },
      { key:'剥落', template:(p)=>'剥卦之落——山附于地，上以厚下安宅。一层层褪去旧日的自我保护机制，露出更为真实的质地。虽显不设防，却暗蓄沉厚之力。' },
      { key:'复归', template:(p)=>'复卦之归——雷在地中，先王以至日闭关。七日来复，万物归根。你回到了某个始点。这不是退化，而是为了重新出发而做的蓄力。' },
      { key:'无妄_真', template:(p)=>'无妄卦之真——天下雷行，物与无妄。摒弃多余的念头，回归事物本来的样子。纯粹的当下不需要任何修饰或期待。' },
      { key:'大畜_藏', template:(p)=>'大畜卦之藏——天在山中，君子以多识前言往行。你正在大量吸收信息或能量，表面看似静止，内在却是饱满的张力。请珍视这段暗哑的蓄力期。' },
      { key:'颐养', template:(p)=>'颐卦之养——山下有雷，君子以慎言语节饮食。好好照顾自己的身体与情绪，这是目前最重要的事。自我关怀不是自私，是生存的基础。' },
      { key:'大过_折', template:(p)=>'大过卦之折——泽灭木，君子以独立不惧。你在承受超越常规的压力，栋梁在吱呀作响。独立是你唯一的武器，不惧是你最坚固的铠甲。' },
      { key:'坎陷', template:(p)=>'坎卦之陷——水洊至，君子以常德行习教事。你正经历一次深刻的低谷。不要急于爬出，坑底的黑暗蕴藏着最纯粹的水源，它将濯去你经年的积尘。' },
      { key:'离明', template:(p)=>'离卦之明——明两作，大人以继明照于四方。你的内在之光正在续燃。一段明亮的精神时期已经开始，适合表达、书写与照亮他人。' }
    ];

    const applicableWx = wuxingOracles.filter(function(wx) { return wx.rule(pfRel, personElem, flowerElem); });

    function elementDynamic(pElem, fElem, phElem, pfRel, fpRel, ppRel) {
